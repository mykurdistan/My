<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="Screenshot_20260303-065649_InShot.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="KMB">

    <style>
        /*    (Splash Screen) */
        #splash-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.6s ease;
        }

        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /*    */
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: auto; 
            min-height: 100vh;
            margin: 0; 
            padding: 20px 0;
            font-family: sans-serif; 
            background: #2c3e50; 
            color: white; 
            overflow-y: auto; 
        }

        /*   */
        @keyframes pulse {
            0% { transform: scale(1); }
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 30px; 
            text-align: center; 
            color: #333; 
            width: 350px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            animation: pulse 2s infinite ease-in-out;
        }

        #number { font-size: 80px; font-weight: bold; margin: 10px 0; color: #2c3e50; }
        
        .grid-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        
        button { 
            font-size: 20px; 
            padding: 20px; 
            cursor: pointer; 
            border-radius: 15px; 
            border: none; 
            color: white; 
            transition: 0.2s; 
            font-weight: bold; 
        }
        
        button:active { transform: scale(0.9); }
        
        .plus-1 { background: #00b894; }
        .plus-5 { background: #00cec9; }
        .minus-1 { background: #d63031; }
        .minus-5 { background: #e17055; }

        h2 { margin: 0; font-size: 22px; color: #636e72; }

        .gift-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
        }
        .gift-btn {
            width: 100%; 
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            font-size: 18px; 
            padding: 16px; 
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(142, 68, 173, 0.3);
        }

        /*       */
        .mission-control-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
            text-align: right;
            direction: rtl;
        }
        .mission-input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }
        .mission-label {
            font-size: 13px;
            color: #636e72;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .mission-input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }
        .mission-save-btn {
            width: 100%;
            background: #0984e3;
            font-size: 16px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .players-status-container {
            background: #f5f6fa;
            border-radius: 12px;
            padding: 10px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #e1b12c;
            font-size: 13px;
        }
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px solid #e2e2e2;
        }
        .player-row:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<div id="splash-overlay">
    <video id="intro-video" autoplay muted playsinline>
        <source src="InShot_20260303_073640134.mp4" type="video/mp4">
    </video>
</div>

<div class="card">
    <h2>KMB Control</h2>
    <div id="number">...</div>
    
    <div class="grid-controls">
        <button class="plus-5" onclick="update(5)">+5</button>
        <button class="plus-1" onclick="update(1)">+1</button>
        <button class="minus-5" onclick="update(-5)">-5</button>
        <button class="minus-1" onclick="update(-1)">-1</button>
    </div>

    <div class="gift-section">
        <button class="gift-btn" onclick="giftOneGame()">    </button>
    </div>

    <!--      -->
    <div class="mission-control-box">
        <h3 style="margin: 0 0 15px; font-size: 17px; color: #2d3436; text-align: center;">   </h3>
        
        <div class="mission-input-group">
            <label class="mission-label">  (Target Score):</label>
            <input type="number" id="missionTarget" class="mission-input" value="1000">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
            <div class="mission-input-group" style="margin-bottom:0;">
                <label class="mission-label"> :</label>
                <input type="number" id="missionStart" class="mission-input" min="0" max="23" value="12">
            </div>
            <div class="mission-input-group" style="margin-bottom:0;">
                <label class="mission-label"> :</label>
                <input type="number" id="missionEnd" class="mission-input" min="0" max="23" value="18">
            </div>
        </div>
        
        <button class="mission-save-btn" onclick="saveDailyMission()">  </button>
        
        <h3 style="margin: 10px 0 8px; font-size: 15px; color: #2d3436;">  :</h3>
        <div id="playersStatusList" class="players-status-container">
            <div style="color: #7f8c8d; text-align: center;"> ...</div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBOkQ3BOGpFnVuYo1664QvsOh1FO36VvW4",
        authDomain: "mybfj-6b83d.firebaseapp.com",
        databaseURL: "https://mybfj-6b83d-default-rtdb.firebaseio.com",
        projectId: "mybfj-6b83d",
        storageBucket: "mybfj-6b83d.firebasestorage.app",
        messagingSenderId: "534313885128",
        appId: "1:534313885128:web:2ecb89d1443256839a34fd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let count = 0;

    const video = document.getElementById('intro-video');
    video.onended = () => hideSplash();
    setTimeout(hideSplash, 3000);

    function hideSplash() {
        const splash = document.getElementById('splash-overlay');
        if(splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 600);
        }
    }

    db.ref('global_count').on('value', (snapshot) => {
        count = snapshot.val() || 0;
        document.getElementById('number').innerText = count;
    });

    function update(val) {
        db.ref('/').update({ global_count: count + val });
    }

    function giftOneGame() {
        db.ref('device_limits').once('value', (snapshot) => {
            if (snapshot.exists()) {
                let updates = {};
                snapshot.forEach((childSnapshot) => {
                    let deviceKey = childSnapshot.key;
                    let deviceData = childSnapshot.val();
                    
                    if (deviceData && deviceData.played > 0) {
                        updates[deviceKey + '/played'] = deviceData.played - 1;
                    }
                });

                if (Object.keys(updates).length > 0) {
                    db.ref('device_limits').update(updates).then(() => {
                        alert(" !      .");
                    }).catch((error) => {
                        alert(" : " + error.message);
                    });
                } else {
                    alert("        !");
                }
            } else {
                alert("     !");
            }
        });
    }

    // ------------------      ------------------
    let currentMission = null;

    //      
    db.ref('daily_mission').on('value', (snap) => {
        currentMission = snap.val();
        if (currentMission) {
            document.getElementById('missionTarget').value = currentMission.target_score;
            document.getElementById('missionStart').value = currentMission.start_hour;
            document.getElementById('missionEnd').value = currentMission.end_hour;
        }
        loadPlayersStatus();
    });

    //        
    db.ref('device_missions').on('value', () => {
        loadPlayersStatus();
    });

    function saveDailyMission() {
        const target = parseInt(document.getElementById('missionTarget').value) || 1000;
        const start = parseInt(document.getElementById('missionStart').value) || 0;
        const end = parseInt(document.getElementById('missionEnd').value) || 23;

        //            
        db.ref('device_missions').remove().then(() => {
            db.ref('daily_mission').set({
                target_score: target,
                start_hour: start,
                end_hour: end
            }).then(() => {
                alert("        !");
            });
        }).catch((err) => {
            alert("   : " + err.message);
        });
    }

    function loadPlayersStatus() {
        if (!currentMission) return;
        
        db.ref('device_missions').once('value', (snapshot) => {
            const listContainer = document.getElementById('playersStatusList');
            listContainer.innerHTML = '';

            if (!snapshot.exists()) {
                listContainer.innerHTML = '<div style="color: #7f8c8d; text-align: center; padding: 10px;">      </div>';
                return;
            }

            const now = new Date();
            const currentHour = now.getHours();
            const endHour = parseInt(currentMission.end_hour);

            snapshot.forEach((childSnap) => {
                const data = childSnap.val();
                const name = data.name || " ";
                const completed = data.completed || false;
                
                let statusText = "";
                let statusColor = "";

                if (completed) {
                    statusText = " ";
                    statusColor = "#27ae60";
                } else {
                    //             
                    if (currentHour >= endHour) {
                        statusText = "  ( )";
                        statusColor = "#c0392b";
                    } else {
                        statusText = "   ( )";
                        statusColor = "#d35400";
                    }
                }

                const item = document.createElement('div');
                item.className = 'player-row';
                item.innerHTML = `
                    <span style="font-weight: bold; color: #2c3e50;">${name}</span>
                    <span style="color: ${statusColor}; font-weight: bold;">${statusText}</span>
                `;
                listContainer.appendChild(item);
            });
        });
    }
    // -----------------------------------------------------------------------
    
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
